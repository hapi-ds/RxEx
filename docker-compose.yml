
services:
  neo4j:
    image: neo4j:5.15-community
    ports:
      - "7474:7474"  # HTTP
      - "7687:7687"  # Bolt
    environment:
      - NEO4J_AUTH=${NEO4J_USERNAME:-neo4j}/${NEO4J_PASSWORD:-password}
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    networks:
      - app_network
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "${NEO4J_USERNAME:-neo4j}", "-p", "${NEO4J_PASSWORD:-password}", "RETURN 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    ports:
      - "8080:8080"
    environment:
      - NEO4J_URI=${NEO4J_URI:-bolt://neo4j:7687}
      - NEO4J_USERNAME=${NEO4J_USERNAME:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-password}
      - JWT_SECRET=${JWT_SECRET:-your-secret-key-change-in-production}
      - JWT_ALGORITHM=${JWT_ALGORITHM:-HS256}
      - JWT_EXPIRATION_MINUTES=${JWT_EXPIRATION_MINUTES:-60}
      - AI_PROVIDER=${AI_PROVIDER:-none}
      - AI_API_ENDPOINT=${AI_API_ENDPOINT:-}
      - AI_API_KEY=${AI_API_KEY:-}
      - AI_MODEL_NAME=${AI_MODEL_NAME:-}
      - AI_REQUEST_TIMEOUT=${AI_REQUEST_TIMEOUT:-60}
      - AI_MAX_CONTEXT_TOKENS=${AI_MAX_CONTEXT_TOKENS:-8000}
      - AI_MAX_HISTORY_MESSAGES=${AI_MAX_HISTORY_MESSAGES:-20}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - LOG_FILE=${LOG_FILE:-app.log}
      - LOG_DIR=${LOG_DIR:-/app/logs}
      - LOG_MAX_SIZE_MB=${LOG_MAX_SIZE_MB:-10}
      - LOG_BACKUP_COUNT=${LOG_BACKUP_COUNT:-5}
      - EMBEDDING_PROVIDER=${EMBEDDING_PROVIDER:-none}
      - EMBEDDING_API_ENDPOINT=${EMBEDDING_API_ENDPOINT:-}
      - EMBEDDING_API_KEY=${EMBEDDING_API_KEY:-}
      - EMBEDDING_MODEL_NAME=${EMBEDDING_MODEL_NAME:-}
      - EMBEDDING_DIMENSIONS=${EMBEDDING_DIMENSIONS:-1536}
      - GRAPHRAG_ENABLED=${GRAPHRAG_ENABLED:-false}
      - GRAPHRAG_TOP_K=${GRAPHRAG_TOP_K:-10}
      - GRAPHRAG_SIMILARITY_THRESHOLD=${GRAPHRAG_SIMILARITY_THRESHOLD:-0.7}
      - GRAPHRAG_TRAVERSAL_DEPTH=${GRAPHRAG_TRAVERSAL_DEPTH:-2}
      - GRAPHRAG_MAX_SUBGRAPH_NODES=${GRAPHRAG_MAX_SUBGRAPH_NODES:-50}
      - GRAPHRAG_DEFAULT_MODE=${GRAPHRAG_DEFAULT_MODE:-auto}
      - GRAPHRAG_COMMUNITY_SCHEDULE_HOURS=${GRAPHRAG_COMMUNITY_SCHEDULE_HOURS:-0}
    volumes:
      - ./backend/src:/app/src:ro
      - ./backend/templates:/app/templates:ro
      - ./backend/scripts:/app/scripts:ro
      - backend_venv:/app/.venv
      - ./logs:/app/logs
    networks:
      - app_network
    depends_on:
      neo4j:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: uv run uvicorn src.app:app --host 0.0.0.0 --port 8080 --reload

  web:
    build:
      context: ./frontends/web
      dockerfile: Dockerfile
      target: development
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=${VITE_API_URL:-http://localhost:8080}
      - VITE_WS_URL=${VITE_WS_URL:-ws://localhost:8080/ws}
    volumes:
      - ./frontends/web/src:/app/src:ro
      - web_node_modules:/app/node_modules
    networks:
      - app_network
    depends_on:
      - backend
    command: npm run dev -- --host 0.0.0.0

  xr:
    build:
      context: ./frontends/xr
      dockerfile: Dockerfile
      target: development
    ports:
      - "3001:3001"
    environment:
      - VITE_API_URL=${VITE_API_URL:-http://localhost:8080}
      - VITE_WS_URL=${VITE_WS_URL:-ws://localhost:8080/ws}
    volumes:
      - ./frontends/xr/src:/app/src:ro
      - xr_node_modules:/app/node_modules
    networks:
      - app_network
    depends_on:
      - backend
    command: npm run dev -- --host 0.0.0.0 --port 3001

  phone:
    build:
      context: ./frontends/phone
      dockerfile: Dockerfile
      target: development
    ports:
      - "3002:3002"
    environment:
      - VITE_API_URL=${VITE_API_URL:-http://localhost:8080}
      - VITE_WS_URL=${VITE_WS_URL:-ws://localhost:8080/ws}
    volumes:
      - ./frontends/phone/src:/app/src:ro
      - phone_node_modules:/app/node_modules
    networks:
      - app_network
    depends_on:
      - backend
    command: npm run dev -- --host 0.0.0.0 --port 3002

  # ============================================================================
  # Reverse Proxy (Optional - Commented Out for Development)
  # ============================================================================
  # Uncomment this service to enable a unified entry point for all services.
  # When enabled, all traffic routes through nginx on port 80:
  #   - /api/*  → backend service (REST API)
  #   - /ws/*   → backend service (WebSocket)
  #   - /xr/*   → xr frontend
  #   - /       → web frontend (default)
  #
  # To enable:
  #   1. Uncomment the proxy service below
  #   2. Create nginx.conf in the project root (see example below)
  #   3. Update frontend environment variables to use proxy URLs:
  #      - VITE_API_URL=http://localhost/api
  #      - VITE_WS_URL=ws://localhost/ws
  #   4. Run: docker compose up -d
  #
  # Example nginx.conf:
  # -------------------
  # events {
  #     worker_connections 1024;
  # }
  #
  # http {
  #     upstream backend {
  #         server backend:8080;
  #     }
  #
  #     upstream web {
  #         server web:3000;
  #     }
  #
  #     upstream xr {
  #         server xr:3001;
  #     }
  #
  #     server {
  #         listen 80;
  #
  #         # Backend API routes
  #         location /api/ {
  #             proxy_pass http://backend/;
  #             proxy_set_header Host $host;
  #             proxy_set_header X-Real-IP $remote_addr;
  #             proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  #             proxy_set_header X-Forwarded-Proto $scheme;
  #         }
  #
  #         # WebSocket routes with upgrade headers
  #         location /ws/ {
  #             proxy_pass http://backend/ws/;
  #             proxy_http_version 1.1;
  #             proxy_set_header Upgrade $http_upgrade;
  #             proxy_set_header Connection "upgrade";
  #             proxy_set_header Host $host;
  #             proxy_set_header X-Real-IP $remote_addr;
  #             proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  #             proxy_set_header X-Forwarded-Proto $scheme;
  #             proxy_read_timeout 86400;
  #         }
  #
  #         # XR frontend routes
  #         location /xr/ {
  #             proxy_pass http://xr/;
  #             proxy_set_header Host $host;
  #             proxy_set_header X-Real-IP $remote_addr;
  #             proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  #             proxy_set_header X-Forwarded-Proto $scheme;
  #         }
  #
  #         # Web frontend (default)
  #         location / {
  #             proxy_pass http://web/;
  #             proxy_set_header Host $host;
  #             proxy_set_header X-Real-IP $remote_addr;
  #             proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  #             proxy_set_header X-Forwarded-Proto $scheme;
  #         }
  #     }
  # }
  # -------------------
  #
  # proxy:
  #   image: nginx:1.25-alpine
  #   ports:
  #     - "80:80"
  #   volumes:
  #     - ./nginx.conf:/etc/nginx/nginx.conf:ro
  #   networks:
  #     - app_network
  #   depends_on:
  #     - backend
  #     - web
  #     - xr
  #   restart: unless-stopped

networks:
  app_network:
    driver: bridge

volumes:
  neo4j_data:
  neo4j_logs:
  backend_venv:
  web_node_modules:
  xr_node_modules:
  phone_node_modules:
